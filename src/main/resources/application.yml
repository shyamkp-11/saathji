server:
  port: 8080

spring:
  application:
    name: ruhani-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:10.0.0.83}:${MYSQL_PORT:3306}/${MYSQL_DB:ruhani}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci"
    username: "${MYSQL_USER:ruhani}"
    password: "${MYSQL_PASSWORD:}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate    # Flyway owns the schema; Hibernate only checks it matches.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: "classpath:db/migration"

ruhani:
  jwt:
    # min 256 bits for HMAC-SHA; override via RUHANI_JWT_SECRET env var in production
    secret: "${RUHANI_JWT_SECRET:ruhani-dev-secret-key-min-256-bits-change-in-prod!!}"
    access-token-expiry-seconds: 900   # 15 minutes
  otp:
    expiry-seconds: 600                # 10 minutes
    universal-bypass: "000000"         # testing shortcut — real OTPs are logged to stdout
  email:
    # 'log' (default) prints OTP to stdout; 'ses' sends via AWS SES v2.
    provider: "${RUHANI_EMAIL_PROVIDER:log}"
    # Verified SES sender; required only when provider=ses.
    from: "${RUHANI_EMAIL_FROM:no-reply@ruhani.app}"
  aws:
    region: "${RUHANI_AWS_REGION:us-east-1}"
