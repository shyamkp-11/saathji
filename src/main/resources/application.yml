server:
  port: 8080
  # When deployed behind a reverse proxy that sets X-Forwarded-* headers,
  # this rewrites remoteAddr / scheme so things like rate-limit-by-IP work.
  forward-headers-strategy: framework

spring:
  application:
    name: ruhani-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:10.0.0.83}:${MYSQL_PORT:3306}/${MYSQL_DB:ruhani}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci"
    username: "${MYSQL_USER:root}"
    password: "${MYSQL_PASSWORD:adminPassword}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate    # Flyway owns the schema; Hibernate only checks it matches.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: "classpath:db/migration"
  mail:
    host: "${SPRING_MAIL_HOST}"
    port: "${SPRING_MAIL_PORT}"
    username: "${SPRING_MAIL_USERNAME:}"
    password: "${SPRING_MAIL_PASSWORD:}"
ruhani:
  jwt:
    # min 256 bits for HMAC-SHA; override via RUHANI_JWT_SECRET env var in production
    secret: "${RUHANI_JWT_SECRET:ruhani-dev-secret-key-min-256-bits-change-in-prod!!}"
    access-token-expiry-seconds: 900   # 15 minutes
  otp:
    expiry-seconds: 600                # 10 minutes
    universal-bypass: "000000"         # testing shortcut — real OTPs are logged to stdout
  email:
    # 'log' (default) prints OTP to stdout; 'ses' sends via AWS SES v2.
    provider: "${RUHANI_EMAIL_PROVIDER:log}"
    # Verified SES sender; required only when provider=ses.
    from: "${RUHANI_EMAIL_FROM:no-reply@saathji.com}"
  aws:
    region: "${RUHANI_AWS_REGION:us-east-2}"
  rate-limit:
    otp-request:
      per-email-per-hour: ${RUHANI_RL_OTP_REQ_PER_EMAIL:5}
      per-ip-per-hour:    ${RUHANI_RL_OTP_REQ_PER_IP:20}
    otp-verify:
      per-email-per-hour: ${RUHANI_RL_OTP_VERIFY_PER_EMAIL:10}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      # 'never' so /actuator/health doesn't leak DB host / version
      show-details: never
